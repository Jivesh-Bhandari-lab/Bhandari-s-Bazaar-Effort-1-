<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="Landing_page.html" title>Bhandari's Market | My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="profileManager()">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="Landing_page.html" class="text-xl font-bold text-orange-600">Bhandari's Market</a>
            <div class="flex items-center space-x-6 text-sm font-semibold text-slate-600">
                <a href="Home.html" class="hover:text-orange-600">Shop</a>
                <a href="Transaction_history.html" class="hover:text-orange-600">Orders</a>
                <button @click="logout" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg hover:bg-red-50 hover:text-red-600 transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-16">
        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
            
            <div class="h-32 bg-gradient-to-r from-orange-400 to-orange-600"></div>

            <div class="px-8 pb-12">
                <div class="relative -mt-16 mb-8 flex flex-col items-center">
                    <div class="relative group">
                        <div class="w-32 h-32 rounded-full border-4 border-white shadow-lg overflow-hidden bg-slate-200">
                            <template x-if="user.profilePic">
                                <img :src="user.profilePic" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!user.profilePic">
                                <div class="w-full h-full flex items-center justify-center text-slate-400">
                                    <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                </div>
                            </template>
                        </div>
                        <label x-show="isEditing" class="absolute bottom-0 right-0 bg-orange-600 text-white p-2 rounded-full cursor-pointer shadow-lg hover:bg-orange-700 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/></svg>
                            <input type="file" class="hidden" @change="handlePicUpload">
                        </label>
                    </div>

                    <h2 class="mt-4 text-2xl font-extrabold text-slate-900" x-text="user.name"></h2>
                    <p class="text-slate-500 font-medium" x-text="user.email"></p>
                </div>

                <div class="space-y-6 max-w-md mx-auto">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Full Name</label>
                            <input 
                                type="text" 
                                x-model="user.name" 
                                :disabled="!isEditing"
                                :class="isEditing ? 'bg-slate-50 border-slate-200 ring-2 ring-orange-500/10' : 'bg-transparent border-transparent'"
                                class="w-full px-4 py-3 rounded-xl border font-semibold text-slate-800 transition-all outline-none"
                            >
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Email Address</label>
                            <input 
                                type="email" 
                                x-model="user.email" 
                                :disabled="!isEditing"
                                :class="isEditing ? 'bg-slate-50 border-slate-200 ring-2 ring-orange-500/10' : 'bg-transparent border-transparent'"
                                class="w-full px-4 py-3 rounded-xl border font-semibold text-slate-800 transition-all outline-none"
                            >
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col gap-3">
                        <template x-if="!isEditing">
                            <button 
                                @click="isEditing = true"
                                class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition shadow-lg active:scale-95"
                            >
                                Edit Profile
                            </button>
                        </template>

                        <template x-if="isEditing">
                            <div class="flex gap-3">
                                <button 
                                    @click="isEditing = false"
                                    class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition"
                                >
                                    Cancel
                                </button>
                                <button 
                                    @click="saveProfile"
                                    class="flex-1 bg-orange-600 text-white font-bold py-4 rounded-2xl hover:bg-orange-700 transition shadow-lg shadow-orange-100"
                                >
                                    Save Changes
                                </button>
                            </div>
                        </template>
                        
                        <button class="text-slate-400 text-xs font-bold hover:text-slate-600 transition py-2">
                            Reset Password
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-12 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-medium leading-relaxed">
                &copy; 2026 Bhandari's Market. All rights reserved. <br>
                This platform and its content are protected under the Copyright Act.
            </p>
        </div>
    </main>

    <script>
        function profileManager() {
            return {
                isEditing: false,
                user: {
                    name: 'Your Name',
                    email: 'Your email@email.market',
                    profilePic: 'https://i.pinimg.com/236x/dd/f0/11/ddf0110aa19f445687b737679eec9cb2.jpg'
                },
                handlePicUpload(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.user.profilePic = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                },
                saveProfile() {
                    this.isEditing = false;
                    alert('Profile updated successfully!');
                },
                logout() {
                    if(confirm('Are you sure you want to logout?')) {
                        window.location.href = 'index.html';
                    }
                }
            }
        }
    </script>
</body>
</html>
