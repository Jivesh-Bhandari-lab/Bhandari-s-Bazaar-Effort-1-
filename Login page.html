<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="C:\Users\jbhan\.vscode\Online Market\Landing_page.html" title>Bhandari's Market | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div 
        x-data="authForm()" 
        class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-100"
    >
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-orange-600 mb-2">Bhandari's Market</h1>
            <p class="text-slate-500" x-text="isLogin ? 'Welcome back! Please login.' : 'Create your bazaar account'"></p>
        </div>

        <template x-if="errorMessage">
            <div class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm">
                <span x-text="errorMessage"></span>
            </div>
        </template>

        <form @submit.prevent="handleSubmit">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input 
                    type="email" 
                    x-model="formData.email"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition"
                    placeholder="name@example.com"
                    required
                >
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input 
                    type="password" 
                    x-model="formData.password"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition"
                    placeholder="••••••••"
                    required
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-200 transition-all transform hover:-translate-y-0.5 active:scale-95"
                x-text="isLogin ? 'Sign In' : 'Create Account'"
            ></button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-slate-600">
                <span x-text="isLogin ? 'New to our bazaar?' : 'Already have an account?'"></span>
                <button 
                    @click="toggleAuth()"
                    class="text-orange-600 font-bold hover:underline ml-1 focus:outline-none"
                    x-text="isLogin ? 'Register Now' : 'Login'"
                ></button>
            </p>
        </div>
    </div>

    <script>
        function authForm() {
            return {
                isLogin: true,
                errorMessage: '',
                formData: {
                    email: '',
                    password: ''
                },
                toggleAuth() {
                    this.isLogin = !this.isLogin;
                    this.errorMessage = '';
                    this.formData.email = '';
                    this.formData.password = '';
                },
                handleSubmit() {
                    this.errorMessage = '';

                    // Simple Validation
                    if (this.formData.password.length < 6) {
                        this.errorMessage = 'Password must be at least 6 characters long.';
                        return;
                    }

                    // Simulate API Call
                    console.log('Form Data:', this.formData);
                    
                    // Generate a fake token
                    const fakeToken = "bhandari_" + btoa(this.formData.email + Date.now());

                    // Store in LocalStorage
                    localStorage.setItem('auth_token', fakeToken);
                    localStorage.setItem('user_email', this.formData.email);

                    alert(this.isLogin ? 'Login Successful!' : 'Registration Successful!');
                    
                    // Redirect or update UI (In a real app, use window.location)
                    console.log('Token stored:', localStorage.getItem('auth_token'));
                }
            }
        }
    </script>
</body>
</html>
