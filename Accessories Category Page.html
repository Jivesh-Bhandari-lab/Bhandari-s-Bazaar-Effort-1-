<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="Landing_page.html" title>Bhandari's Market | Accessories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="accessoriesPage()">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="Landing_page.html" class="text-xl font-bold text-orange-600">Bhandari's Market</a>
            <div class="flex items-center space-x-4 text-sm font-medium text-slate-600">
                <a href="Home.html" class="hover:text-orange-600">Home</a>
                <span>/</span>
                <span class="text-orange-600">Accessories</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900">The Accessory Vault</h1>
            <p class="text-slate-500 mt-2">Elevate your style with our handpicked local treasures.</p>
            
            <div class="flex flex-wrap gap-2 mt-6">
                <template x-for="tag in ['All', 'Watch', 'Hair Clip', 'Comb', 'Glasses', 'Bag']">
                    <button 
                        @click="activeFilter = tag"
                        :class="activeFilter === tag ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-slate-600 border-slate-200'"
                        class="px-5 py-2 rounded-full text-sm font-bold border transition-all shadow-sm"
                        x-text="tag">
                    </button>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <template x-for="item in filteredItems()" :key="item.id">
                <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500 group">
                    
                    <div class="relative h-64 overflow-hidden bg-slate-100" x-data="{ slide: 0 }">
                        <template x-for="(img, i) in item.images" :key="i">
                            <img 
                                x-show="slide === i" 
                                :src="img" 
                                class="w-full h-full object-cover transition duration-700 group-hover:scale-110"
                                x-transition:enter="opacity-0 scale-95"
                                x-transition:enter-end="opacity-100 scale-100"
                            >
                        </template>

                        <div class="absolute inset-0 flex items-center justify-between px-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button @click="slide = (slide === 0 ? 2 : slide - 1)" class="w-8 h-8 flex items-center justify-center bg-white/90 rounded-full shadow-lg text-slate-800">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button @click="slide = (slide === 2 ? 0 : slide + 1)" class="w-8 h-8 flex items-center justify-center bg-white/90 rounded-full shadow-lg text-slate-800">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>

                        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2">
                            <template x-for="(img, i) in item.images">
                                <div :class="slide === i ? 'w-6 bg-orange-500' : 'w-2 bg-white/50'" class="h-1 rounded-full transition-all duration-300"></div>
                            </template>
                        </div>
                    </div>

                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-slate-800 text-lg leading-tight" x-text="item.name"></h3>
                            <span class="text-orange-600 font-black" x-text="'$' + item.price"></span>
                        </div>
                        <p class="text-slate-400 text-xs mt-1 uppercase font-bold tracking-widest" x-text="item.tag"></p>
                        <p class="text-slate-500 text-sm mt-3 line-clamp-2" x-text="item.desc"></p>
                        
                        <div class="mt-6 flex flex-col gap-2">
                            <button @click="buy(item)" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition-colors shadow-lg active:scale-95">
                                Buy Now
                            </button>
                            <button class="w-full text-slate-400 text-xs font-semibold py-2 hover:text-slate-600 transition">
                                View Details
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function accessoriesPage() {
            return {
                activeFilter: 'All',
                items: [
                    { id: 1, tag: 'Watch', name: 'Chronos Silver', price: 180, desc: 'Water-resistant luxury timepiece with a sleek mesh band.', images: ['https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&q=80&w=600'] },
                    { id: 2, tag: 'Watch', name: 'Classic Leather', price: 145, desc: 'Genuine brown leather strap with a minimalist dial.', images: ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1508685096489-7aac29625b3b?auto=format&fit=crop&q=80&w=600'] },
                    { id: 3, tag: 'Hair Clip', name: 'Pearl Cascade', price: 18, desc: 'Hand-set resin pearls on a high-tension gold clip.', images: ['https://images.unsplash.com/photo-1630332458173-772922659e9a?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1590439471364-192aa70c0b53?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1630332458428-11116c4767e7?auto=format&fit=crop&q=80&w=600'] },
                    { id: 4, tag: 'Hair Clip', name: 'Matte Claw', price: 12, desc: 'Non-slip matte finish for effortless all-day hold.', images: ['https://images.unsplash.com/photo-1630332458739-1bc43a756611?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1606131731446-5568d87113aa?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1611082216849-067f97541604?auto=format&fit=crop&q=80&w=600'] },
                    { id: 5, tag: 'Comb', name: 'Sandalwood Fine', price: 22, desc: 'Anti-static natural wood to prevent hair breakage.', images: ['https://images.unsplash.com/photo-1590159763121-7c9fd312190d?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1590159800676-e6962f3f7211?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1522338140262-f46f5912018a?auto=format&fit=crop&q=80&w=600'] },
                    { id: 6, tag: 'Comb', name: 'Pro Groomer', price: 15, desc: 'Heat-resistant carbon fiber for styling and detangling.', images: ['https://images.unsplash.com/photo-1585232004423-244e0e6904e3?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1534723328310-e82dad3ee43f?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&q=80&w=600'] },
                    { id: 7, tag: 'Glasses', name: 'Aviator Gold', price: 120, desc: 'Polarized lenses with 100% UV protection and ultra-light frame.', images: ['https://images.unsplash.com/photo-1511499767390-a73359580bc8?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1473496169904-658ba7c44d8a?auto=format&fit=crop&q=80&w=600'] },
                    { id: 8, tag: 'Glasses', name: 'Retro Tortoise', price: 95, desc: 'Classic square frames with blue-light filtering technology.', images: ['https://images.unsplash.com/photo-1577803645773-f96470509666?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1509100194014-d49809396daa?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1551028150-64b9f398f678?auto=format&fit=crop&q=80&w=600'] },
                    { id: 9, tag: 'Bag', name: 'Urban Leather Tote', price: 240, desc: 'Spacious full-grain leather bag with laptop sleeve.', images: ['https://images.unsplash.com/photo-1584917033904-4911ad44a8fe?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1594223274512-ad4803739b7c?auto=format&fit=crop&q=80&w=600'] },
                    { id: 10, tag: 'Bag', name: 'Minimalist Backpack', price: 85, desc: 'Weatherproof nylon construction for the modern commuter.', images: ['https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1622560480605-d83c853bc5c3?auto=format&fit=crop&q=80&w=600', 'https://images.unsplash.com/photo-1575844021530-5dc326c261ce?auto=format&fit=crop&q=80&w=600'] },
                ],
                filteredItems() {
                    if (this.activeFilter === 'All') return this.items;
                    return this.items.filter(i => i.tag === this.activeFilter);
                },
                buy(item) {
                    if (confirm(`Confirm purchase for ${item.name} ($${item.price})?`)) {
                        const email = localStorage.getItem('user_email') || 'customer@bhandari.market';
                        setTimeout(() => {
                            alert(`Transaction successful! 🚀\n\nA booking confirmation for your ${item.name} has been sent to ${email}. Thank you for shopping with Bhandari's Market!`);
                        }, 800);
                    }
                }
            }
        }
    </script>
</body>
</html>
