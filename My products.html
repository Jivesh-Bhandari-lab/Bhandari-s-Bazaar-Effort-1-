<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="Landing_page.html" title>Bhandari's Market | My Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="inventoryManager()">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="C:\Users\jbhan\.vscode\Online Market\Landing_page.html" class="text-xl font-bold text-orange-600">Bhandari's Market</a>
            <div class="flex items-center space-x-6 text-sm font-semibold text-slate-600">
                <a href="Home.html" class="hover:text-orange-600">Home</a>
                <a href="My products.html" class="text-orange-600">My Products</a>
                <div class="w-8 h-8 rounded-full bg-slate-200"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Seller Dashboard</h1>
                <p class="text-slate-500">Manage your active listings and payment details.</p>
            </div>
            <button 
                @click="showModal = true"
                class="inline-flex items-center justify-center gap-2 bg-orange-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-700 transition-all shadow-lg shadow-orange-100"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Add New Product
            </button>
        </div>

        <template x-if="products.length === 0">
            <div class="bg-white rounded-3xl p-20 text-center border-2 border-dashed border-slate-200">
                <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="2"/></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800">No products yet</h3>
                <p class="text-slate-500">Click the button above to start selling on the market.</p>
            </div>
        </template>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="(product, index) in products" :key="index">
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                    <div class="h-48 bg-slate-100 relative">
                        <img :src="product.image" class="w-full h-full object-cover">
                        <span class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-slate-800" x-text="product.category"></span>
                    </div>
                    <div class="p-5 flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-slate-900 text-lg" x-text="product.name"></h3>
                            <span class="text-orange-600 font-bold" x-text="'₹' + product.price"></span>
                        </div>
                        <p class="text-slate-500 text-sm line-clamp-2 mb-4" x-text="product.description"></p>
                        <div class="pt-4 border-t border-slate-50 space-y-1">
                            <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Payment Info</p>
                            <p class="text-xs text-slate-600 font-medium" x-text="'UPI: ' + product.upi"></p>
                        </div>
                    </div>
                    <div class="p-4 bg-slate-50 flex gap-2">
                        <button @click="removeProduct(index)" class="flex-1 text-red-600 font-bold text-xs hover:bg-red-50 py-2 rounded-lg transition">Remove</button>
                        <button class="flex-1 text-slate-600 font-bold text-xs hover:bg-slate-200 py-2 rounded-lg transition">Edit Listing</button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div 
        x-show="showModal" 
        x-cloak
        class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
    >
        <div 
            @click.away="showModal = false"
            class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col"
        >
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-2xl font-extrabold text-slate-900">List New Product</h2>
                <button @click="showModal = false" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
                </button>
            </div>

            <form @submit.prevent="addProduct" class="p-8 overflow-y-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Product Image</label>
                        <div class="relative h-40 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center bg-slate-50 overflow-hidden">
                            <template x-if="!imagePreview">
                                <div class="text-center">
                                    <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg>
                                    <p class="text-xs text-slate-500">Click to upload JPG or PNG</p>
                                </div>
                            </template>
                            <template x-if="imagePreview">
                                <img :src="imagePreview" class="w-full h-full object-cover">
                            </template>
                            <input type="file" @change="handleFileUpload" class="absolute inset-0 opacity-0 cursor-pointer" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Product Name</label>
                        <input type="text" x-model="newProduct.name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Vintage Denim Jacket" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Category</label>
                        <select x-model="newProduct.category" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" required>
                            <option value="">Select Category</option>
                            <option>Clothes</option>
                            <option>Accessories</option>
                            <option>Groceries</option>
                            <option>Electronics</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Price (INR)</label>
                        <input type="number" x-model="newProduct.price" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="0.00" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">UPI ID</label>
                        <input type="text" x-model="newProduct.upi" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="user@upi" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
                        <textarea x-model="newProduct.description" rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="Tell buyers about your product..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Seller Contact</label>
                        <input type="text" x-model="newProduct.contact" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="Phone or Email" required>
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" class="w-full bg-orange-600 text-white font-bold py-4 rounded-2xl hover:bg-orange-700 transition shadow-lg">Confirm & Post Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function inventoryManager() {
            return {
                showModal: false,
                imagePreview: null,
                products: [], // This would be fetched from your database in a real app
                newProduct: {
                    name: '',
                    category: '',
                    price: '',
                    upi: '',
                    description: '',
                    contact: '',
                    image: ''
                },
                handleFileUpload(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.imagePreview = event.target.result;
                            this.newProduct.image = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                },
                addProduct() {
                    // Add the new product to the local list
                    this.products.push({ ...this.newProduct });
                    
                    // Reset Form
                    this.showModal = false;
                    this.newProduct = { name: '', category: '', price: '', upi: '', description: '', contact: '', image: '' };
                    this.imagePreview = null;
                    
                    alert('Product listed successfully!');
                },
                removeProduct(index) {
                    if(confirm('Are you sure you want to remove this listing?')) {
                        this.products.splice(index, 1);
                    }
                }
            }
        }
    </script>
</body>
</html>
