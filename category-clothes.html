<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="Landing_page.html" title>Bhandari's Market | Clothes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="categoryPage()">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="Landing_page.html" class="text-xl font-bold text-orange-600">Bhandari's Market</a>
                <div class="flex items-center space-x-6 text-sm font-medium">
                    <a href="Home.html" class="text-slate-600 hover:text-orange-600">Home</a>
                    <span class="text-slate-300">/</span>
                    <span class="text-orange-600">Clothes</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Premium Clothing</h1>
                <p class="text-slate-500 mt-2">Browse our latest collection of local and branded wear.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <template x-for="tag in ['All', 'Shirt', 'Jeans', 'Sweater', 'Cap', 'Fancy']">
                    <button 
                        @click="filter = tag"
                        :class="filter === tag ? 'bg-orange-600 text-white' : 'bg-white text-slate-600 hover:bg-orange-50'"
                        class="px-4 py-2 rounded-full text-sm font-semibold border border-slate-200 transition-all shadow-sm"
                        x-text="tag">
                    </button>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <template x-for="product in filteredProducts()" :key="product.id">
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl transition-shadow group">
                    
                    <div class="relative h-72 overflow-hidden bg-slate-200" x-data="{ currentImg: 0 }">
                        <template x-for="(img, index) in product.images" :key="index">
                            <img 
                                x-show="currentImg === index" 
                                :src="img" 
                                class="w-full h-full object-cover transition-opacity duration-500"
                                x-transition:enter="transition ease-out duration-300"
                                x-transition:enter-start="opacity-0"
                                x-transition:enter-end="opacity-100"
                            >
                        </template>

                        <div class="absolute inset-0 flex items-center justify-between px-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button @click="currentImg = (currentImg === 0 ? 2 : currentImg - 1)" class="p-1 bg-white/80 rounded-full shadow hover:bg-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button @click="currentImg = (currentImg === 2 ? 0 : currentImg + 1)" class="p-1 bg-white/80 rounded-full shadow hover:bg-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>

                        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex space-x-1.5">
                            <template x-for="(img, index) in product.images">
                                <div :class="currentImg === index ? 'bg-orange-600 w-4' : 'bg-white/60 w-2'" class="h-2 rounded-full transition-all"></div>
                            </template>
                        </div>

                        <div class="absolute top-4 left-4">
                            <span class="bg-slate-900/80 backdrop-blur-md text-white text-[10px] uppercase font-bold px-3 py-1 rounded-full tracking-widest" x-text="product.tag"></span>
                        </div>
                    </div>

                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-slate-800" x-text="product.name"></h3>
                            <span class="text-orange-600 font-bold" x-text="'$' + product.price"></span>
                        </div>
                        <p class="text-slate-500 text-sm mb-6 line-clamp-2" x-text="product.description"></p>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button @click="viewDetails(product)" class="py-2.5 px-4 text-sm font-semibold text-slate-600 bg-slate-50 rounded-xl hover:bg-slate-100 transition">
                                Details
                            </button>
                            <button @click="buyNow(product)" class="py-2.5 px-4 text-sm font-bold text-white bg-orange-600 rounded-xl hover:bg-orange-700 shadow-md shadow-orange-100 transition">
                                Buy Now
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function categoryPage() {
            return {
                filter: 'All',
                products: [
                    { id: 1, tag: 'Shirt', name: 'Classic Linen Shirt', price: 45, description: 'Breathable linen blend perfect for summer evenings.', images: ['https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1604691815313-28eb81df730d?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1598033129183-c4f50c7176c8?auto=format&fit=crop&q=80&w=500'] },
                    { id: 2, tag: 'Shirt', name: 'Oxford Button Down', price: 55, description: 'Timeless style for business or casual meetups.', images: ['https://images.unsplash.com/photo-1588359348347-9bc6cbb6fb99?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1621072156002-e2fcced0b170?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&q=80&w=500'] },
                    { id: 3, tag: 'Jeans', name: 'Slim Fit Denim', price: 89, description: 'Durable selvedge denim with a modern tailored cut.', images: ['https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&q=80&w=500'] },
                    { id: 4, tag: 'Jeans', name: 'Straight Leg Raw', price: 75, description: 'Classic rugged denim for everyday durability.', images: ['https://images.unsplash.com/photo-1604176354204-926873ff34b0?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1525299374597-9115d90c3d33?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1475178626620-a4d074967452?auto=format&fit=crop&q=80&w=500'] },
                    { id: 5, tag: 'Sweater', name: 'Cashmere V-Neck', price: 120, description: 'Ultra-soft ethically sourced premium cashmere.', images: ['https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1574167132742-1358ef666595?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1556905055-8f358a7a4bb4?auto=format&fit=crop&q=80&w=500'] },
                    { id: 6, tag: 'Sweater', name: 'Cable Knit Wool', price: 95, description: 'Thick, warm wool pattern for the cold season.', images: ['https://images.unsplash.com/photo-1614676471928-2ed0ad1061a4?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1516762689617-e1cffcef479d?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1543087903-1ac2ec7aa8c5?auto=format&fit=crop&q=80&w=500'] },
                    { id: 7, tag: 'Cap', name: 'Canvas Baseball Cap', price: 25, description: 'Weathered canvas for a relaxed, outdoor look.', images: ['https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1521369909029-2afed882baee?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1572307480813-ceb0e59d232b?auto=format&fit=crop&q=80&w=500'] },
                    { id: 8, tag: 'Cap', name: 'Wool Winter Beanie', price: 30, description: 'Ribbed wool to keep you warm in the frost.', images: ['https://images.unsplash.com/photo-1576871337622-98d48d1cf531?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1618354691792-d1d42acfd860?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1456339345513-247514a60161?auto=format&fit=crop&q=80&w=500'] },
                    { id: 9, tag: 'Fancy', name: 'Velvet Evening Blazer', price: 210, description: 'Lustrous velvet tailored for special occasions.', images: ['https://images.unsplash.com/photo-1594932224828-b4b059b6f6f9?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1534030347209-467a5b0ad3e6?auto=format&fit=crop&q=80&w=500'] },
                    { id: 10, tag: 'Fancy', name: 'Silk Cocktail Dress', price: 185, description: 'Pure silk finish with elegant drape and flow.', images: ['https://images.unsplash.com/photo-1539109132381-31512579f455?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?auto=format&fit=crop&q=80&w=500', 'https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?auto=format&fit=crop&q=80&w=500'] },
                ],
                filteredProducts() {
                    if (this.filter === 'All') return this.products;
                    return this.products.filter(p => p.tag === this.filter);
                },
                viewDetails(product) {
                    alert(`Opening detail page for: ${product.name}`);
                    // window.location.href = `/product/${product.id}`;
                },
                buyNow(product) {
                    // Simulating transaction and email
                    const confirmed = confirm(`Complete purchase for ${product.name} ($${product.price})?`);
                    if (confirmed) {
                        const userEmail = localStorage.getItem('user_email') || 'your-email@example.com';
                        setTimeout(() => {
                            alert(`Success! A booking confirmation for the ${product.name} has been sent to ${userEmail}. Check your inbox!`);
                        }, 500);
                    }
                }
            }
        }
    </script>
</body>
</html>
