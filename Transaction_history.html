<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="Landing_page.html" title>Bhandari's Market | Order History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900" x-data="orderHistory()">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <a href="Landing_page.html" class="text-xl font-bold text-slate-800">Bhandari's <span class="text-orange-600">Market</span></a>
            </div>
            <div class="flex items-center space-x-6 text-sm font-semibold text-slate-600">
                <a href="Home.html" class="hover:text-orange-600 transition">Shop</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Order History</h1>
                <p class="text-slate-500 mt-1">Track and manage your recent purchases.</p>
            </div>
            <div class="flex gap-2">
                <button @click="filter = 'All'" :class="filter === 'All' ? 'bg-slate-900 text-white' : 'bg-white text-slate-600'" class="px-4 py-2 rounded-lg text-sm font-bold border border-slate-200 transition shadow-sm">All</button>
                <button @click="filter = 'Delivered'" :class="filter === 'Delivered' ? 'bg-green-600 text-white' : 'bg-white text-slate-600'" class="px-4 py-2 rounded-lg text-sm font-bold border border-slate-200 transition shadow-sm">Delivered</button>
            </div>
        </div>

        <div class="space-y-4">
            <template x-for="order in filteredOrders()" :key="order.id">
                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow group">
                    <div class="p-5 sm:p-6 flex flex-col sm:flex-row items-center gap-6">
                        
                        <div class="w-24 h-24 flex-shrink-0 bg-slate-100 rounded-xl overflow-hidden border border-slate-100">
                            <img :src="order.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>

                        <div class="flex-grow text-center sm:text-left">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-2">
                                <h3 class="text-lg font-bold text-slate-900" x-text="order.name"></h3>
                                <span class="text-slate-900 font-black text-lg" x-text="'₹' + order.price"></span>
                            </div>
                            <div class="flex flex-wrap justify-center sm:justify-start items-center gap-4 text-sm font-medium text-slate-500">
                                <div class="flex items-center gap-1.5">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    <span x-text="order.date"></span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <span class="text-slate-300">|</span>
                                    <span>Order ID: <span class="text-slate-700" x-text="order.orderId"></span></span>
                                </div>
                            </div>
                        </div>

                        <div class="flex-shrink-0 min-w-[140px] flex justify-center">
                            <template x-if="order.status === 'Pending'">
                                <div class="flex items-center gap-2 px-4 py-2 bg-yellow-50 text-yellow-700 rounded-full font-bold text-xs uppercase tracking-widest border border-yellow-100">
                                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                                    Pending
                                </div>
                            </template>

                            <template x-if="order.status === 'Delivered'">
                                <div class="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-full font-bold text-xs uppercase tracking-widest border border-green-100">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    Delivered
                                </div>
                            </template>

                            <template x-if="order.status === 'Failed'">
                                <div class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-700 rounded-full font-bold text-xs uppercase tracking-widest border border-red-100">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    Failed
                                </div>
                            </template>
                        </div>
                    </div>
                    
                    <div class="px-6 py-3 bg-slate-50 flex justify-end gap-4 border-t border-slate-100">
                        <button class="text-xs font-bold text-slate-500 hover:text-orange-600 transition">Get Invoice</button>
                        <button class="text-xs font-bold text-slate-500 hover:text-orange-600 transition">Need Help?</button>
                    </div>
                </div>
            </template>
        </div>

        <template x-if="filteredOrders().length === 0">
            <div class="py-20 text-center">
                <div class="inline-block p-6 bg-slate-100 rounded-full mb-4">
                    <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800">No orders found</h3>
                <p class="text-slate-500">Items you purchase will appear here.</p>
            </div>
        </template>
    </main>

    <script>
        function orderHistory() {
            return {
                filter: 'All',
                orders: [
                    { id: 1, orderId: 'BM-8821', name: 'MacBook Pro 14 (Silver)', price: '1,29,990', date: 'Oct 12, 2025', status: 'Delivered', image: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&q=80&w=200' },
                    { id: 2, orderId: 'BM-8834', name: 'Organic Honey Apples (5kg)', price: '750', date: 'Oct 14, 2025', status: 'Pending', image: 'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&q=80&w=200' },
                    { id: 3, orderId: 'BM-8845', name: 'Leather Urban Tote', price: '4,500', date: 'Oct 10, 2025', status: 'Failed', image: 'https://images.unsplash.com/photo-1584917033904-4911ad44a8fe?auto=format&fit=crop&q=80&w=200' },
                    { id: 4, orderId: 'BM-8851', name: 'Slim Fit Selvedge Jeans', price: '2,200', date: 'Sep 28, 2025', status: 'Delivered', image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=200' },
                    { id: 5, orderId: 'BM-8860', name: 'Vintage Edison Bulbs (Pack 4)', price: '1,200', date: 'Sep 25, 2025', status: 'Delivered', image: 'https://images.unsplash.com/photo-1517420812314-8e16167c1c0d?auto=format&fit=crop&q=80&w=200' }
                ],
                filteredOrders() {
                    if (this.filter === 'All') return this.orders;
                    return this.orders.filter(o => o.status === this.filter);
                }
            }
        }
    </script>
</body>
</html>
