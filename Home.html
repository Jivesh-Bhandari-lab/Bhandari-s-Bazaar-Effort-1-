<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="C:\Users\jbhan\.vscode\Online Market\Landing_page.html" title>Bhandari's Market | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .category-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <span class="text-xl font-bold text-orange-600">Bhandari's Market</span>
            
            <div class="hidden md:flex items-center space-x-6 text-sm font-medium text-slate-600">
                <a href="C:\Users\jbhan\.vscode\Online Market\Landing_page.html" class="text-orange-600">Home</a>
                <a href="C:\Users\jbhan\.vscode\Online Market\My products.html" class="hover:text-orange-600 transition">My Products</a>
                <a href="C:\Users\jbhan\.vscode\Online Market\Transaction_history.html" class="hover:text-orange-600 transition">Orders</a>
                <a href="C:\Users\jbhan\.vscode\Online Market\profile.html" class="flex items-center gap-2 hover:text-orange-600 transition border-l pl-6 border-slate-200">
                    <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                    </div>
                    Profile
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <header class="mb-12">
            <h1 class="text-3xl font-extrabold text-slate-900">Explore our Bazaar</h1>
            <p class="text-slate-500 mt-2 text-lg">Pick a category to start discovering quality local goods.</p>
        </header>

        <div id="category-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="mt-20 py-10 border-t border-slate-200 text-center text-slate-400 text-sm italic">
        "Bhandari's Market — From our stalls to your doorstep"
    </footer>

    <script>
        // # CONFIGURATION: Add your local webpage paths here
        const categories = [
            { 
                name: 'Clothes', 
                img: 'https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?auto=format&fit=crop&q=80&w=500',
                link: 'C:/Users/jbhan/.vscode/Online Market/category-clothes.html' // # Add clothes page path here
            },
            { 
                name: 'Accessories', 
                img: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=500',
                link: 'C:/Users/jbhan/.vscode/Online Market/Accessories Category Page.html' // # Add accessories page path here
            },
            { 
                name: 'Groceries', 
                img: 'https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=500',
                link: 'C:/Users/jbhan/.vscode/Online Market/Groceries Category page.html' // # Add groceries page path here
            },
            { 
                name: 'Electronics', 
                img: 'https://images.unsplash.com/photo-1498049794561-7780e7231661?auto=format&fit=crop&q=80&w=500',
                link: 'C:/Users/jbhan/.vscode/Online Market/Electronics category.html' // # Add electronics page path here
            }
        ];

        // # RENDER: Injects cards into the HTML
        const container = document.getElementById('category-container');
        container.innerHTML = categories.map(cat => `
            <div onclick="navigateTo('${cat.link}')" class="category-card group cursor-pointer bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100">
                <div class="h-48 overflow-hidden bg-slate-200">
                    <img src="${cat.img}" alt="${cat.name}" class="w-full h-full object-cover transition-transform duration-500">
                </div>
                <div class="p-6 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-slate-800">${cat.name}</h3>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-orange-600 group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </div>
                </div>
            </div>
        `).join('');

        // # NAVIGATION: Logic to open your webpages
        function navigateTo(url) {
            if(url && url !== 'undefined') {
                window.location.href = url;
            } else {
                alert("Page link not set yet!");
            }
        }
    </script>
</body>
</html>
